<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" role="img" aria-label="Lewis Cloud Innovations">
  <title>Lewis Cloud Innovations</title>

  <!-- Icon mark box -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="none" stroke="#00A6A6" stroke-width="2"/>
  <rect x="5" y="5" width="54" height="54" rx="7" fill="#00A6A6" fill-opacity="0.1"/>

  <!-- LCI monogram -->
  <text x="32" y="43"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
    font-weight="700"
    font-size="24"
    fill="#00A6A6"
    text-anchor="middle"
    letter-spacing="3">LCI</text>

  <!-- Top-left corner bracket -->
  <polyline points="0,16 0,4 12,4" fill="none" stroke="#00A6A6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom-right corner bracket -->
  <polyline points="64,48 64,60 52,60" fill="none" stroke="#00A6A6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark — navy on light, swap to white on dark via CSS -->
  <text x="80" y="36"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
    font-weight="700"
    font-size="18"
    fill="#0A2540"
    letter-spacing="-0.3">Lewis Cloud Innovations</text>

  <!-- Tagline -->
  <text x="81" y="52"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
    font-weight="400"
    font-size="8"
    fill="#00A6A6"
    letter-spacing="1.8">CLOUD · SECURITY · COMPLIANCE</text>

</svg>
